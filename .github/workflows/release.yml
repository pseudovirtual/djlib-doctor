name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install build tools
        run: python -m pip install build twine
      - name: Install package with test dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run tests
        run: python -m unittest discover -s tests
      - name: Build package
        run: python -m build
      - name: Check package
        run: python -m twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, 'rc')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1

  testpypi:
    needs: build
    if: github.event_name == 'workflow_dispatch' || (startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, 'rc'))
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  testpypi-smoke:
    needs: testpypi
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install from TestPyPI in a clean venv
        shell: bash
        run: |
          python - <<'PY'
          import os
          import re
          import subprocess
          import time
          import venv
          from pathlib import Path

          version = re.search(r'^version = "([^"]+)"', Path("pyproject.toml").read_text(), re.MULTILINE).group(1)
          venv_dir = Path("smoke-venv")
          venv.EnvBuilder(with_pip=True).create(venv_dir)
          python = venv_dir / ("Scripts/python.exe" if os.name == "nt" else "bin/python")
          script = venv_dir / ("Scripts/djlib-doctor.exe" if os.name == "nt" else "bin/djlib-doctor")
          install = [
              str(python),
              "-m",
              "pip",
              "install",
              "--index-url",
              "https://test.pypi.org/simple/",
              "--extra-index-url",
              "https://pypi.org/simple",
              f"djlib-doctor=={version}",
          ]
          for attempt in range(12):
              try:
                  subprocess.check_call(install)
                  break
              except subprocess.CalledProcessError:
                  if attempt == 11:
                      raise
                  time.sleep(10)
          subprocess.check_call([str(script), "self-test"])
          PY
