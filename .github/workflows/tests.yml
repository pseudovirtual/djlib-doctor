name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev tools
        run: python -m pip install -e ".[dev]"
      - name: Run Ruff
        run: |
          ruff check .
          ruff format --check .
      - name: Run tests
        run: PYTHONPATH=src python -m unittest discover -s tests
